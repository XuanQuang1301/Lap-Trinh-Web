<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Quản lý sinh viên</title>
    <style>
        #confirm-section { display: none; }
        #form-error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class = "container">

        <div id = "form-section">
            <h2>Nhap thong tin sinh vien</h2>
            <div id = "form-error"></div>
            <div id = "form-success"></div>
            <div>
                <label> Ma sinh vien</label>
                <input type="text" id = "studentId">
            </div>
            <div>
                <label>Ten sinh vien</label>
                <input type="text" id = "studentName">
            </div>
            <div>
                <label>Ngay sinh</label>
                <input type="date" id = "studentDob">
            </div>
            <div>
                <label>Khoa</label>
                <select id="studentDept">
                    <option value="">Chon khoa</option>
                    <option value="">-- Chọn khoa --</option>
                    <option value="CNTT">Công nghệ thông tin (CNTT)</option>
                    <option value="ATTT">An toàn thông tin (ATTT)</option>
                    <option value="DTVT">Điện tử viễn thông (DTVT)</option>
                </select>
            </div>
            <button onclick="handleAdd()">Add</button>
            <button onclick="handleReset()">Reset</button>
        </div>
        <div id = "confirm-section">
            <h2>Xac nhan thong tin</h2>
            <ul>
                <li><strong> Ma SV:</strong> <span id ="conf-id"> </span></li>
                <li><strong>Ho va ten</strong><span id = "conf-name"> </span></li>
                <li><strong>Ngày sinh:</strong> <span id="conf-dob"></span></li>
                <li><strong>Khoa:</strong> <span id="conf-dept"></span></li>
            </ul>
            <button onclick="handleConfirm()">Confirm</button>
            <button onClick= "handleBack()">Back</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
