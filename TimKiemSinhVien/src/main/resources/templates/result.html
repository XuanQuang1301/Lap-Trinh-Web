<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kết quả tìm kiếm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Danh sách sinh viên</h2>
    <table>
        <thead>
        <tr>
            <th>STT</th>
            <th>ID</th>
            <th>Tên sinh viên</th>
            <th>Khoa</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="sv, iter : ${students}">
            <td th:text="${iter.index + 1}"></td>
            <td th:text="${sv.id}"></td>
            <td th:text="${sv.name}"></td>
            <td th:text="${sv.department}"></td>
            <td>
                <div th:if="${sv.selected == 0}">
                    <form th:action="@{/select}" method="post" style="margin: 0;">
                        <input type="hidden" name="id" th:value="${sv.id}" />
                        <button type="submit">Select</button>
                    </form>
                </div>
                <div th:unless="${sv.selected == 0}">
                    <span class="status-text">Selected</span>
                </div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(students)}">
            <td colspan="5" style="text-align: center;">Không tìm thấy sinh viên nào khớp yêu cầu.</td>
        </tr>
        </tbody>
    </table>
    <br>
    <a th:href="@{/}" style="text-decoration: none; color: #3498db;">← Quay lại trang tìm kiếm</a>
</div>
</body>
</html>
