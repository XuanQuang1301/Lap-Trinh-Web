<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Tim kiem va lua chon sinh vien</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 800px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        input { padding: 5px; width: 250px; }
        button { padding: 8px 15px; cursor: pointer; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        #result-section { display: none; }
    </style>
</head>
<body>

<div class = "container">
    <div id = "search-section">
        <h2>
            Tim kiem sinh vien
        </h2>
        <div class = "form-group">
            <label>Ma sinh vien:</label>
            <input type="text" id = "studentId">
        </div>
        <div class = "form-group">
            <label>Ten sinh vien:</label>
            <input type="text" id = "studentName">
        </div>
        <div class = "form-group">
            <label>Ngay sinh:</label>
            <input type="date" id = "studentDob">
        </div>
        <div class = "form-group">
            <label>Khoa:</label>
            <input type="text" id = "studentDept">
        </div>
        <button onclick="handleSearch()">Search</button>
    </div>
    <div id = "result-section">
        <h2>Ket qua tim kiem</h2>
        <button onclick="handleBack()">Quay lai</button>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Ngay Sinh</th>
                    <th>Khoa</th>
                    <th>Thao tac</th>
                </tr>
            </thead>
            <tbody id = "table-body"></tbody>
        </table>
    </div>
</div>

<script>
    window.onload =() => {
        const savedSearch = sessionStorage.getItem("lastStudentSearch");
        if(savedSearch){
            const data = JSON.parse(savedSearch);
            document.getElementById("studentId").value = data.id || "";
            document.getElementById("studentName").value = data.name || "";
            document.getElementById("studentDob").value = data.dob || "";
            document.getElementById("studentDept").value = data.department || "";
        }
    };
    async function handleSearch(){
        const id = document.getElementById("studentId").value.trim(); 
        const name = document.getElementById("studentName").value.trim(); 
        const dobStr = document.getElementById("studentDob").value.trim(); 
        const dept = document.getElementById("studentDept").value.trim(); 
        const dob = dobStr ? dobStr : null; 
        if(!id && !name && !dept && !dob){
            alert("Vui long nhap it nhat 1 truong"); 
            return; 
        }
        const searchData = {id, name, dob, dept}; 
        sessionStorage.setItem("lastStudenSearch", JSON.stringify(searchData)); 
        try{
            const response = await fetch('/api/student/search', {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(searchData)
            }); 
            if(response.ok){
                const student = await response.json(); 
                renderTable(student); 
                document.getElementById("search-section").style.display = "none"; 
                document.getElementById("result-section").style.display = "block"; 
            }else{
                alert("Loi tim kiem")
            }
        }catch(error){
            alert("Loi ket noi server"); 
        }

    }
    function renderTable(student){
        const tbody = document.getElementById("table-body"); 
        tbody.innerHTML = ""; 
        if(student.length === 0 ){
            tbody.innerHTML = "<tr><td colspan='5'>Không tìm thấy sinh viên nào!</td></tr>";
            return; 
        }
        student.forEach(student => {
            let actionHtml = ""; 
            if(student.selected === 0){
                actionHtml = `<button onclick="handleSelect('${student.id}')">Select</button>`;
            }else{
                actionHtml = `<span style="color: blue; font-weight: bold;">Selected</span>`;
            }
            const tr = `
                <tr>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.dob}</td>
                    <td>${student.department}</td>
                    <td>${actionHtml}</td>
                </tr>
            `;
            tbody.innerHTML += tr;
        })
    }
        async function handleSelect(studentId){
        try {
            const response = await fetch('/api/student/select/${studentId}', {
                method: 'POST'
            })
            if(response.ok){
                alert("Da lua chon sinh vien"); 
                handleback(); 
            }else{
                alert("loi khi chon sinh vien")
            }
        }catch(error){
            alert("Loi server"); 
        }
    }
    function handleBack(){
        document.getElementById("search-section").style.display = "block"; 
        document.getElementById("result-section").style.display = "none";
    }
</script>
</body>
</html>
